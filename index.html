<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Star</title>

<style>

/* ===== ОСНОВА ===== */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:white;
scroll-behavior:smooth;
}

/* ===== HEADER ===== */
header{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
padding:15px 20px;
background:rgba(2,6,23,0.85);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
color:#38bdf8;
font-weight:bold;
}

nav a{
color:white;
margin:0 8px;
text-decoration:none;
font-size:14px;
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(135deg,#0ea5e9,#6366f1);
}

.hero h1{
font-size:40px;
margin:0;
animation:fadeUp 1s;
}

.hero p{
font-size:18px;
animation:fadeUp 1.5s;
}

.btn{
margin-top:20px;
padding:12px 20px;
background:white;
color:black;
border-radius:10px;
border:none;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* ===== СЕКЦИИ ===== */
.section{
padding:80px 20px;
max-width:1000px;
margin:auto;
}

.services{
display:grid;
grid-template-columns:1fr;
gap:15px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* ===== ФОРМА ===== */
input, textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

/* ===== SUCCESS MESSAGE ===== */
#success{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#22c55e;
padding:15px 25px;
border-radius:10px;
display:none;
animation:fadeDown 0.5s;
}

/* ===== АНИМАЦИИ ===== */
@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes fadeDown{
from{opacity:0; transform:translate(-50%,-20px);}
to{opacity:1; transform:translate(-50%,0);}
}

/* ===== RESPONSIVE ===== */
@media(min-width:700px){
.services{
grid-template-columns:repeat(2,1fr);
}

.hero h1{
font-size:60px;
}

.hero p{
font-size:22px;
}
}

@media(min-width:1000px){
.services{
grid-template-columns:repeat(4,1fr);
}
}

</style>
</head>

<body>

<div id="success">✅ Поръчката е изпратена!</div>

<header>
<div class="logo">Nova Star</div>
<nav>
<a href="#services">Услуги</a>
<a href="#contact">Поръчка</a>
</nav>
</header>

<section class="hero">
<h1>Nova Star</h1>
<p>Модерни сайтове и приложения</p>
<a href="#contact" class="btn">Започни</a>
</section>

<section id="services" class="section">
<h2>Услуги</h2>
<div class="services">
<div class="card">🌐 Уебсайтове</div>
<div class="card">📱 Приложения</div>
<div class="card">🎮 Игри</div>
<div class="card">⚙️ Поддръжка</div>
</div>
</section>

<section id="contact" class="section">
<h2>Поръчка</h2>

<form id="form">
<input type="text" name="name" placeholder="Име" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Какво искате?"></textarea>
<button class="btn">Изпрати</button>
</form>

</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ТУК",
  authDomain: "ТУК",
  projectId: "ТУК",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("form");
const success = document.getElementById("success");

form.addEventListener("submit", async (e)=>{
e.preventDefault();

const data = new FormData(form);

await addDoc(collection(db, "orders"), {
name: data.get("name"),
email: data.get("email"),
message: data.get("message"),
time: new Date()
});

// показване на съобщение
success.style.display = "block";

setTimeout(()=>{
success.style.display = "none";
},3000);

form.reset();
});
</script>

</body>
</html>
